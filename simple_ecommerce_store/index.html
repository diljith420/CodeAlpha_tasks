<!DOCTYPE html>
<html>

<head>
  <title>Simple Ecommerce Store</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .products {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 15px;
      width: 250px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    .cart {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>Simple Ecommerce Store</h1>

  <h2>User Registration</h2>

  <input type="text" id="username" placeholder="Username">

  <input type="password" id="password" placeholder="Password">

  <button onclick="registerUser()">Register</button>

  <h2>Products</h2>

  <div class="products">

    <div class="card">
      <img src="https://picsum.photos/300?1">

      <h3>Laptop</h3>

      <p>₹50000</p>

      <button onclick="addToCart('Laptop',50000)">
        Add to Cart
      </button>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300?2">

      <h3>Phone</h3>

      <p>₹20000</p>

      <button onclick="addToCart('Phone',20000)">
        Add to Cart
      </button>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300?3">

      <h3>Headphones</h3>

      <p>₹3000</p>

      <button onclick="addToCart('Headphones',3000)">
        Add to Cart
      </button>
    </div>

  </div>

  <div class="cart">

    <h2>Shopping Cart</h2>

    <ul id="cartItems"></ul>

    <h3 id="total">Total: ₹0</h3>

    <button onclick="placeOrder()">
      Place Order
    </button>

  </div>

  <script>

    let cart = [];
    let total = 0;

    function addToCart(name, price) {

      cart.push({
        name: name,
        price: price
      });

      total += price;

      document.getElementById("cartItems").innerHTML +=
        "<li>" + name + " - ₹" + price + "</li>";

      document.getElementById("total").innerText =
        "Total: ₹" + total;
    }

    function registerUser() {

      const username =
        document.getElementById("username").value;

      alert("User Registered: " + username);
    }

    function placeOrder() {

      alert("Order Placed Successfully");

      cart = [];

      total = 0;

      document.getElementById("cartItems").innerHTML = "";

      document.getElementById("total").innerText =
        "Total: ₹0";
    }

  </script>

</body>

</html>
